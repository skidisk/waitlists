<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stanford Waitlist</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:#f0f0f0}
  .header{background:#8C1515;color:#fff;padding:22px 16px 18px;text-align:center}
  .header h1{font-size:20px;font-weight:700;line-height:1.3}
  .header p{font-size:13px;opacity:.8;margin-top:5px}
  .list{max-width:500px;margin:16px auto;padding:0 12px}
  .row{display:flex;align-items:center;background:#fff;border-radius:8px;margin-bottom:8px;padding:13px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .pos{background:#8C1515;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-right:14px}
  .name{font-size:16px;color:#222}
  .empty{text-align:center;color:#888;padding:40px 16px;font-size:15px}
  .footer{text-align:center;color:#aaa;font-size:11px;padding:20px}
</style>
</head>

</html>
